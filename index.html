<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main">
        <nav>
            <span>
                <img src="assests/logo.svg" alt="netflixlogo">
            </span>
            <div class="flex">
                <button class="btn eng">English</button>
                <button class="btn red-btn btn-sn">Sign in</button>
            </div>
        </nav>
        <div class="box">
        </div>
        <div class="intro">
            <span>Unlimited movies, shows, and more</span>
            <span>Starts at ₹149. Cancel at any time.</span>
            <span>Ready to watch? Enter your email to create or restart your membership.</span>
            <div class="loginbtns">
                <input type="text" placeholder="Email address">
                <button class="btn red-btn get-started">Get Started</button>
            </div>
        </div>

        <div class="separation">
        </div>

        <div class="trend">
            Trending Now
        </div>
        <div class="trendrow">
            
            <div class="trendcard">
            <span class="rank">1</span>
            <img src="trendinglist/bhoothbangla.webp" alt="Bhoot Bangla">
            </div>
            
            <div class="trendcard">
            <span class="rank">2</span>
            <img src="trendinglist/teachalesson.webp" alt="Teach You A Lesson">
            </div>

            <div class="trendcard">
            <span class="rank">3</span>
            <img src="trendinglist/maabehen.webp" alt="Maa Behen">
            </div>

            <div class="trendcard">
            <span class="rank">4</span>
            <img src="trendinglist/dhurandhar.webp" alt="Dhurandhar">
            </div>
          
            <div class="trendcard">
            <span class="rank">5</span>
            <img src="trendinglist/dhurandharrev.webp" alt="Dhurandhar revenge">
            </div>

            <div class="trendcard">
            <span class="rank">6</span>
            <img src="trendinglist/kapil.webp" alt="Kapil">
            </div>

            <div class="trendcard">
            <span class="rank">7</span>
            <img src="trendinglist/kara.webp" alt="Kara">
            </div>

            <div class="trendcard">
            <span class="rank">8</span>
            <img src="trendinglist\AAAABfVr3AFRJUTlwiBo4JbBj1bbpf_NfEZRRvvsj0qU7aYoY8To-wi9dSY1k1bAKXIt7MuTW5ZCyoIVwxoJOMNghayVkZcqIRN59qs.webp" alt="Dhurandhar raw">
            </div>

            <div class="trendcard">
            <span class="rank">9</span>
            <img src="trendinglist/slife.webp" alt="Sexlife">
            </div>

            <div class="trendcard">
            <span class="rank">10</span>
            <img src="trendinglist/wonderfool.webp" alt="Wonder fools">
            </div>
            
        </div>

        <div class="features">
            <div class="to-join">
                More Reason to join
            </div>
            <div class="cards">
                <div class="cardid"> 1
                </div>
                <div class="cardid"> 1
                </div>
                <div class="cardid"> 1
                </div>
                <div class="cardid"> 1
                </div>
            </div>
        </div>
    </div>

</body>

</html>
