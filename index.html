<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Clone</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main">
        <nav>
            <span>
                <img src="assests/logo.svg" alt="netflixlogo">
            </span>
            <div class="flex">
                <button class="btn eng">English</button>
                <button class="btn red-btn btn-sn">Sign in</button>
            </div>
        </nav>
        <div class="box">
        </div>
        <div class="intro">
            <span>Unlimited movies, shows, and more</span>
            <span>Starts at ₹149. Cancel at any time.</span>
            <span>Ready to watch? Enter your email to create or restart your membership.</span>
            <div class="loginbtns">
                <input type="text" placeholder="Email address">
                <button class="btn red-btn get-started">Get Started</button>
            </div>
        </div>

        <div class="separation">
        </div>

    </div>

</body>

</html>
